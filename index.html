<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NyayaMitra - Smart Legal Assistant</title>
  <link rel="icon" type="img" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSGxPbSXmiFVH9bevTkPOjnEVf1eJWHPpVaRg&s">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f0f4fb;
      --card: #ffffff;
      --text: #1a2540;
      --text-muted: #5a6a85;
      --primary: #1e3a8a;
      --primary-light: #3b5fcf;
      --accent: #e8a020;
      --border: #dde4f0;
      --sidebar-w: 260px;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(30,58,138,0.08);
      --transition: 0.25s ease;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--primary);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      padding: 0;
      z-index: 200;
      transition: transform var(--transition);
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 1.5rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-title i { color: var(--accent); }

    .logo-sub {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .sidebar-logo-img {
      width: 100%;
      max-width: 160px;
      border-radius: 12px;
      margin: 1rem auto;
      display: block;
      opacity: 0.9;
    }

    .sidebar-nav {
      flex: 1;
      padding: 0.75rem 0.75rem;
    }

    .nav-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      padding: 0.5rem 0.75rem;
      margin-top: 0.5rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 14px;
      margin: 3px 0;
      border-radius: 10px;
      cursor: pointer;
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      font-weight: 500;
      transition: background var(--transition), color var(--transition);
    }

    .nav-item i { width: 18px; text-align: center; font-size: 0.95rem; }

    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .nav-item.active {
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 1rem 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .logout-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: transparent;
      color: rgba(255,255,255,0.75);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }

    .logout-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      transform: none;
      box-shadow: none;
    }

    /* ===== TOPBAR (mobile/tablet) ===== */
    .topbar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: var(--primary);
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      z-index: 300;
      box-shadow: 0 2px 12px rgba(30,58,138,0.2);
    }

    .topbar-logo {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-logo i { color: var(--accent); }

    .hamburger {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.25rem;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background var(--transition);
    }

    .hamburger:hover {
      background: rgba(255,255,255,0.15);
      transform: none;
      box-shadow: none;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 199;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      padding: 2rem;
      transition: margin var(--transition);
    }

    /* ===== CARDS ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      margin-bottom: 1.25rem;
      color: var(--primary);
    }

    .card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    /* ===== GRID LAYOUTS ===== */
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem; }

    /* ===== STAT CARDS ===== */
    .stat-card {
      background: var(--card);
      border-radius: 14px;
      padding: 1.25rem;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .stat-card .stat-icon {
      font-size: 1.6rem;
      margin-bottom: 0.4rem;
    }

    .stat-card .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-card .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ===== BUTTONS ===== */
    button, .btn {
      background: var(--primary);
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      color: white;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    button:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(30,58,138,0.2);
    }

    .btn-success { background: var(--success); }
    .btn-success:hover { background: #15803d; }
    .btn-danger { background: var(--danger); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover { background: var(--primary); color: #fff; }
    .btn-sm { padding: 7px 14px; font-size: 0.82rem; }
    .btn-full { width: 100%; justify-content: center; }

    /* ===== INPUTS ===== */
    input, select, textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      padding: 11px 14px;
      border-radius: 10px;
      width: 100%;
      margin-bottom: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      transition: border-color var(--transition);
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary-light);
      background: #fff;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group { margin-bottom: 0.25rem; }

    /* ===== BADGES ===== */
    .badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-active { background: #dbeafe; color: #1e40af; }
    .badge-closed { background: #dcfce7; color: #15803d; }
    .badge-high { background: #fee2e2; color: #b91c1c; }
    .badge-medium { background: #fef3c7; color: #92400e; }

    /* ===== FLEX HELPERS ===== */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }

    .flex-center { display: flex; align-items: center; justify-content: center; }
    .flex-gap { display: flex; align-items: center; gap: 0.75rem; }
    .flex-wrap { flex-wrap: wrap; }

    /* ===== CHAT ===== */
    .chat-box {
      height: 280px;
      overflow-y: auto;
      background: var(--bg);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }

    .msg-row { margin-bottom: 0.6rem; }
    .msg-you { text-align: right; }
    .msg-bubble {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 14px;
      font-size: 0.88rem;
      max-width: 80%;
    }

    .msg-bubble-you { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .msg-bubble-other { background: #fff; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-name { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 2px; }

    /* ===== CASE ITEM ===== */
    .case-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 0.9rem;
      transition: box-shadow var(--transition);
    }

    .case-item:hover { box-shadow: 0 6px 24px rgba(30,58,138,0.1); }
    .case-item h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; }
    .case-meta { font-size: 0.83rem; color: var(--text-muted); margin-bottom: 0.3rem; display: flex; gap: 0.5rem; align-items: center; }
    .case-meta i { color: var(--primary-light); width: 14px; }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      top: 20px; right: 20px;
      background: var(--primary);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      z-index: 9999;
      font-size: 0.88rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(30,58,138,0.25);
      display: flex;
      align-items: center;
      gap: 9px;
      animation: slideIn 0.3s ease;
    }

    .notification.error { background: var(--danger); }

    @keyframes slideIn {
      from { transform: translateX(110%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ===== AUTH PAGE ===== */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 40%, #1d4ed8 100%);
      padding: 1.5rem;
    }

    .auth-card {
      background: #fff;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .auth-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--primary);
    }

    .auth-logo p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }

    .auth-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text-muted);
      transition: background var(--transition), color var(--transition);
    }

    .auth-tab.active {
      background: var(--primary);
      color: #fff;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      margin-bottom: 1.5rem;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--primary);
    }

    .page-header p { font-size: 0.85rem; color: var(--text-muted); margin-top: 3px; }

    /* ===== ADVOCATE CARD ===== */
    .advocate-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 0.9rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      transition: box-shadow var(--transition);
    }

    .advocate-card:hover { box-shadow: 0 6px 24px rgba(30,58,138,0.1); }

    .advocate-avatar {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .advocate-info { flex: 1; min-width: 0; }
    .advocate-info h3 { font-size: 1rem; font-weight: 600; }
    .advocate-info p { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }
    .advocate-meta { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .advocate-tag {
      background: #eff6ff;
      color: var(--primary);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ===== LOADING ===== */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== DIVIDER ===== */
    .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

    /* ===== PROFILE ===== */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .profile-avatar {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .profile-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
    .profile-role { font-size: 0.82rem; color: var(--text-muted); }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .profile-row:last-child { border-bottom: none; }
    .profile-row i { color: var(--primary-light); width: 18px; text-align: center; }
    .profile-row strong { min-width: 120px; color: var(--text-muted); font-weight: 500; }

    /* ===== APPOINTMENT CARD ===== */
    .appt-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .appt-icon {
      width: 44px; height: 44px;
      background: #eff6ff;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .appt-info { flex: 1; min-width: 0; }
    .appt-info h4 { font-size: 0.95rem; font-weight: 600; }
    .appt-info p { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    /* ===== SEARCH BAR ===== */
    .search-bar {
      position: relative;
      margin-bottom: 1rem;
    }

    .search-bar input { padding-left: 38px; margin-bottom: 0; }
    .search-bar i {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ===== TOOLS SECTION ===== */
    .tool-card {
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      border: 1px solid #bfdbfe;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .tool-card h3 { color: var(--primary); font-size: 1rem; margin-bottom: 0.75rem; }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state i { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    /* ==========================================
       RESPONSIVE: TABLET (≤ 1024px)
    ========================================== */
    @media (max-width: 1024px) {
      :root { --sidebar-w: 220px; }

      .main-content { padding: 1.5rem; }

      .grid-3 { grid-template-columns: repeat(3,1fr); gap: 0.85rem; }

      .logo-title { font-size: 1.25rem; }

      .advocate-card { flex-direction: column; }
    }

    /* ==========================================
       RESPONSIVE: MOBILE + TABLET (≤ 768px)
    ========================================== */
    @media (max-width: 768px) {
      .topbar { display: flex; }

      .sidebar {
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,0.2);
      }

      .sidebar.open { transform: translateX(0); }

      .sidebar-overlay.open { display: block; }

      .main-content {
        margin-left: 0;
        padding: 1rem;
        padding-top: 72px; /* below topbar */
      }

      .grid-3 { grid-template-columns: repeat(2,1fr); gap: 0.75rem; }
      .grid-2 { grid-template-columns: 1fr; }

      .card { padding: 1.1rem; }
      .card h2 { font-size: 1.15rem; }

      .page-header h1 { font-size: 1.3rem; }

      .flex-between { flex-wrap: wrap; gap: 0.5rem; }

      .stat-card .stat-num { font-size: 1.6rem; }

      .advocate-card { flex-direction: column; }
      .advocate-avatar { width: 40px; height: 40px; font-size: 1rem; }

      .profile-header { flex-direction: column; text-align: center; }
      .profile-row strong { min-width: 90px; }

      .appt-card { flex-wrap: wrap; }

      .chat-box { height: 220px; }

      button { padding: 9px 16px; }
      .btn-full { width: 100%; }

      .notification { left: 12px; right: 12px; top: 70px; }
    }

    /* ==========================================
       RESPONSIVE: SMALL MOBILE (≤ 480px)
    ========================================== */
    @media (max-width: 480px) {
      .grid-3 { grid-template-columns: 1fr; }

      .auth-card { padding: 1.5rem; }
      .auth-logo h1 { font-size: 1.6rem; }

      .stat-card { padding: 1rem; }
      .stat-card .stat-num { font-size: 1.4rem; }

      .page-header h1 { font-size: 1.15rem; }

      .case-item, .advocate-card, .appt-card { padding: 0.9rem 1rem; }

      .flex-between { flex-direction: column; align-items: flex-start; }

      .profile-row { flex-wrap: wrap; gap: 4px; }
    }
  </style>
</head>
<body>

<!-- Topbar (mobile/tablet) -->
<div class="topbar" id="topbar">
  <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
    <i class="fas fa-bars"></i>
  </button>
  <div class="topbar-logo">
    <i class="fas fa-gavel"></i> NyayaMitra
  </div>
  <div style="width:40px"></div>
</div>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-title"><i class="fas fa-gavel"></i> NyayaMitra</div>
      <div class="logo-sub">Smart Legal Assistant</div>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSGxPbSXmiFVH9bevTkPOjnEVf1eJWHPpVaRg&s"
           alt="NyayaMitra" class="sidebar-logo-img">
    </div>

    <nav class="sidebar-nav" id="sidebarNav"></nav>

    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <div class="loading"><div class="spinner"></div><span>Loading NyayaMitra...</span></div>
  </main>
</div>

<script>
  const API_URL = 'https://backendlegalapp.onrender.com';
  let currentUser = null;
  let currentSection = 'dashboard';

  /* ===== UTILITIES ===== */
  function showNotification(message, type = 'success') {
    const notif = document.createElement('div');
    notif.className = `notification${type === 'error' ? ' error' : ''}`;
    notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3500);
  }

  async function apiCall(endpoint, method = 'GET', data = null) {
    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (data) options.body = JSON.stringify(data);
    try {
      const response = await fetch(`${API_URL}/${endpoint}`, options);
      if (!response.ok) throw new Error('API call failed');
      return await response.json();
    } catch (error) {
      console.error('API Error:', error);
      showNotification('Network error. Check server connection.', 'error');
      return null;
    }
  }

  function translateText(text, fromLang) {
    if (fromLang !== 'english') return `[AI Translated] ${text} (Original: ${fromLang})`;
    return text;
  }

  function detectCategory(desc) {
    const l = desc.toLowerCase();
    if (l.includes('property') || l.includes('land')) return 'Property Law';
    if (l.includes('criminal') || l.includes('theft')) return 'Criminal Law';
    if (l.includes('family') || l.includes('divorce')) return 'Family Law';
    return 'General Law';
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  /* ===== SIDEBAR TOGGLE ===== */
  document.getElementById('hamburgerBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  });

  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

  /* ===== AUTH ===== */
  async function handleLogin(email, password) {
    const users = await apiCall('users');
    if (!users) return false;
    const user = users.find(u => u.email === email && u.password === password);
    if (user) {
      currentUser = user;
      localStorage.setItem('currentUser', JSON.stringify(user));
      showNotification(`Welcome back, ${user.name}!`);
      renderApp();
      return true;
    }
    showNotification('Invalid email or password', 'error');
    return false;
  }

  async function handleSignup(userData) {
    const users = await apiCall('users');
    if (users.find(u => u.email === userData.email)) {
      showNotification('Email already registered!', 'error');
      return false;
    }
    const newUser = {
      ...userData,
      id: `u${Date.now()}`,
      createdAt: new Date().toISOString()
    };
    if (userData.role === 'advocate') {
      newUser.category = 'General Law';
      newUser.fee = 2000;
      newUser.availability = ['Monday', 'Wednesday', 'Friday'];
      newUser.rating = 0;
    }
    const result = await apiCall('users', 'POST', newUser);
    if (result) {
      showNotification('Account created! Please login.');
      renderAuth();
      return true;
    }
    return false;
  }

  /* ===== RENDER AUTH ===== */
  function renderAuth() {
    document.getElementById('topbar').style.display = 'none';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('mainContent').style.marginLeft = '0';
    document.getElementById('mainContent').style.paddingTop = '0';
    document.getElementById('mainContent').style.padding = '0';

    document.getElementById('mainContent').innerHTML = `
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="auth-logo">
            <h1><i class="fas fa-gavel" style="color:var(--primary)"></i> NyayaMitra</h1>
            <p>Smart Legal Assistant for Everyone</p>
          </div>

          <div class="auth-tabs" id="authTabs">
            <div class="auth-tab active" data-tab="login">Login</div>
            <div class="auth-tab" data-tab="signup">Sign Up</div>
          </div>

          <div id="authFormContainer">
            ${loginFormHTML()}
          </div>
        </div>
      </div>
    `;

    setupAuthTabs();
  }

  function loginFormHTML() {
    return `
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-full" style="margin-top:0.5rem">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
    `;
  }

  function signupFormHTML() {
    return `
      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Create a password" required>
        </div>
        <div class="form-group">
          <label>I am a</label>
          <select id="signupRole" required>
            <option value="client">Client (Looking for legal help)</option>
            <option value="advocate">Advocate (Lawyer)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="signupPhone" placeholder="+91 XXXXX XXXXX">
        </div>
        <div class="form-group">
          <label>City / Location</label>
          <input type="text" id="signupLocation" placeholder="e.g. Hyderabad">
        </div>
        <button type="submit" class="btn-full" style="margin-top:0.5rem">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
    `;
  }

  function setupAuthTabs() {
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        if (tab.dataset.tab === 'login') {
          document.getElementById('authFormContainer').innerHTML = loginFormHTML();
          attachLoginListener();
        } else {
          document.getElementById('authFormContainer').innerHTML = signupFormHTML();
          attachSignupListener();
        }
      });
    });
    attachLoginListener();
  }

  function attachLoginListener() {
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      await handleLogin(
        document.getElementById('loginEmail').value,
        document.getElementById('loginPassword').value
      );
    });
  }

  function attachSignupListener() {
    document.getElementById('signupForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      await handleSignup({
        name: document.getElementById('signupName').value,
        email: document.getElementById('signupEmail').value,
        password: document.getElementById('signupPassword').value,
        role: document.getElementById('signupRole').value,
        phone: document.getElementById('signupPhone').value,
        location: document.getElementById('signupLocation').value
      });
    });
  }

  /* ===== RENDER APP ===== */
  async function renderApp() {
    if (!currentUser) { renderAuth(); return; }

    // Restore sidebar/topbar
    const topbar = document.getElementById('topbar');
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('mainContent');

    topbar.style.display = '';
    sidebar.style.display = '';
    main.style.padding = '';
    main.style.paddingTop = '';
    main.style.marginLeft = '';

    const nav = document.getElementById('sidebarNav');
    if (currentUser.role === 'client') {
      nav.innerHTML = `
        <div class="nav-label">Main</div>
        <div class="nav-item" data-nav="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
        <div class="nav-item" data-nav="newcase"><i class="fas fa-plus-circle"></i> New Case</div>
        <div class="nav-item" data-nav="mycases"><i class="fas fa-folder-open"></i> My Cases</div>
        <div class="nav-label">Connect</div>
        <div class="nav-item" data-nav="advocates"><i class="fas fa-user-graduate"></i> Find Advocates</div>
        <div class="nav-item" data-nav="chat"><i class="fas fa-comments"></i> Messages</div>
        <div class="nav-label">Account</div>
        <div class="nav-item" data-nav="profile"><i class="fas fa-user"></i> Profile</div>
      `;
    } else {
      nav.innerHTML = `
        <div class="nav-label">Main</div>
        <div class="nav-item" data-nav="dashboard"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="nav-item" data-nav="allcases"><i class="fas fa-list"></i> Browse Cases</div>
        <div class="nav-item" data-nav="myassigned"><i class="fas fa-briefcase"></i> My Cases</div>
        <div class="nav-label">Operations</div>
        <div class="nav-item" data-nav="appointments"><i class="fas fa-calendar-alt"></i> Appointments</div>
        <div class="nav-item" data-nav="chat"><i class="fas fa-comments"></i> Messages</div>
        <div class="nav-item" data-nav="tools"><i class="fas fa-tools"></i> Tools</div>
        <div class="nav-label">Account</div>
        <div class="nav-item" data-nav="profile"><i class="fas fa-user"></i> Profile</div>
      `;
    }

    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        currentSection = el.dataset.nav;
        closeSidebar();
        renderMain();
      });
    });

    // Set active
    document.querySelector(`[data-nav="${currentSection}"]`)?.classList.add('active');
    await renderMain();
  }

  async function renderMain() {
    const container = document.getElementById('mainContent');
    container.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

    if (currentUser.role === 'client') {
      const fns = { dashboard: renderClientDashboard, newcase: renderNewCaseForm, mycases: renderClientCases, advocates: renderAdvocatesList, chat: renderClientChat, profile: renderUserProfile };
      await (fns[currentSection] || renderClientDashboard)(container);
    } else {
      const fns = { dashboard: renderAdvocateDashboard, allcases: renderAllCases, myassigned: renderAssignedCases, appointments: renderAppointments, chat: renderAdvocateChat, tools: renderAdvocateTools, profile: renderUserProfile };
      await (fns[currentSection] || renderAdvocateDashboard)(container);
    }
  }

  /* ===== CLIENT SECTIONS ===== */
  async function renderClientDashboard(container) {
    const cases = await apiCall('cases') || [];
    const myCases = cases.filter(c => c.clientId === currentUser.id);
    const pending = myCases.filter(c => c.status === 'pending').length;
    const active = myCases.filter(c => c.status === 'active').length;
    const closed = myCases.filter(c => c.status === 'closed').length;

    container.innerHTML = `
      <div class="page-header">
        <h1>Welcome back, ${currentUser.name} ⚖️</h1>
        <p>Here's an overview of your legal matters</p>
      </div>
      <div class="grid-3" style="margin-bottom:1.25rem">
        <div class="stat-card">
          <div class="stat-icon">📌</div>
          <div class="stat-num">${pending}</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⚖️</div>
          <div class="stat-num">${active}</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-num">${closed}</div>
          <div class="stat-label">Closed</div>
        </div>
      </div>
      ${myCases.length === 0 ? `
        <div class="card">
          <div class="empty-state">
            <i class="fas fa-folder-open"></i>
            <p>No cases yet. Submit your first case to get started.</p>
            <button style="margin-top:1rem" onclick="currentSection='newcase';renderMain()">
              <i class="fas fa-plus"></i> New Case
            </button>
          </div>
        </div>
      ` : `
        <div class="card">
          <h2>Recent Cases</h2>
          ${myCases.slice(0,3).map(c => caseItemHTML(c, null)).join('')}
        </div>
      `}
    `;
  }

  function caseItemHTML(c, advocateName) {
    const statusClass = { pending: 'badge-pending', active: 'badge-active', closed: 'badge-closed' }[c.status] || 'badge-medium';
    return `
      <div class="case-item">
        <div class="flex-between">
          <h3>${c.title}</h3>
          <span class="badge ${statusClass}">${c.status}</span>
        </div>
        <div class="case-meta"><i class="fas fa-tag"></i> ${c.category}</div>
        ${advocateName ? `<div class="case-meta"><i class="fas fa-user-tie"></i> ${advocateName}</div>` : ''}
        <div class="case-meta"><i class="fas fa-clock"></i> ${c.timeline?.[0] || 'N/A'}</div>
      </div>
    `;
  }

  function renderNewCaseForm(container) {
    container.innerHTML = `
      <div class="page-header">
        <h1>Submit New Case</h1>
        <p>Describe your legal issue in any language</p>
      </div>
      <div class="card">
        <form id="caseForm">
          <div class="form-group">
            <label>Case Title</label>
            <input type="text" id="caseTitle" placeholder="Brief title of your issue" required>
          </div>
          <div class="form-group">
            <label>Describe Your Issue</label>
            <textarea id="caseDesc" placeholder="Describe your legal issue in Telugu, Hindi, or English..." rows="5" required></textarea>
          </div>
          <div class="form-group">
            <label>Language</label>
            <select id="langSelect">
              <option value="telugu">తెలుగు (Telugu)</option>
              <option value="hindi">हिन्दी (Hindi)</option>
              <option value="english">English</option>
            </select>
          </div>
          <button type="submit" class="btn-full">
            <i class="fas fa-paper-plane"></i> Submit Case
          </button>
        </form>
      </div>
    `;

    document.getElementById('caseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('caseTitle').value;
      const desc = document.getElementById('caseDesc').value;
      const lang = document.getElementById('langSelect').value;

      const newCase = {
        id: `c${Date.now()}`,
        clientId: currentUser.id,
        title,
        description: desc,
        languageInput: lang,
        translatedText: translateText(desc, lang),
        category: detectCategory(desc),
        status: 'pending',
        timeline: [`Submitted: ${new Date().toLocaleDateString()}`],
        advocateId: null,
        createdAt: new Date().toISOString(),
        priority: 'Medium',
        documents: []
      };

      await apiCall('cases', 'POST', newCase);
      showNotification(`Case submitted! Category: ${newCase.category}`);
      currentSection = 'mycases';
      renderMain();
    });
  }

  async function renderClientCases(container) {
    const cases = await apiCall('cases') || [];
    const myCases = cases.filter(c => c.clientId === currentUser.id);
    const users = await apiCall('users') || [];

    container.innerHTML = `
      <div class="page-header">
        <h1>My Cases</h1>
        <p>${myCases.length} case${myCases.length !== 1 ? 's' : ''} found</p>
      </div>
      <div class="card">
        ${myCases.length ? myCases.map(c => {
          const adv = users.find(u => u.id === c.advocateId);
          return caseItemHTML(c, adv ? adv.name : 'Not assigned');
        }).join('') : `<div class="empty-state"><i class="fas fa-folder-open"></i><p>No cases submitted yet.</p></div>`}
      </div>
    `;
  }

  async function renderAdvocatesList(container) {
    const users = await apiCall('users') || [];
    const advocates = users.filter(u => u.role === 'advocate');

    container.innerHTML = `
      <div class="page-header">
        <h1>Find Advocates</h1>
        <p>${advocates.length} advocates available</p>
      </div>
      <div class="card">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchCat" placeholder="Search by name or category...">
        </div>
        <div id="advList">${renderAdvocateCards(advocates)}</div>
      </div>
    `;

    attachAdvocateBooking(advocates);

    document.getElementById('searchCat').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = advocates.filter(a =>
        a.category?.toLowerCase().includes(term) || a.name?.toLowerCase().includes(term)
      );
      document.getElementById('advList').innerHTML = renderAdvocateCards(filtered);
      attachAdvocateBooking(filtered);
    });
  }

  function renderAdvocateCards(advocates) {
    if (!advocates.length) return `<div class="empty-state"><i class="fas fa-user-slash"></i><p>No advocates found.</p></div>`;
    return advocates.map(a => `
      <div class="advocate-card">
        <div class="advocate-avatar"><i class="fas fa-user-tie"></i></div>
        <div class="advocate-info">
          <div class="flex-between">
            <h3>${a.name}</h3>
            <span style="color:var(--warning);font-size:0.88rem">⭐ ${a.rating || 0}</span>
          </div>
          <p>${a.location || 'Location not specified'}</p>
          <div class="advocate-meta">
            <span class="advocate-tag"><i class="fas fa-gavel"></i> ${a.category}</span>
            <span class="advocate-tag">₹${a.fee}/session</span>
          </div>
          <p style="font-size:0.8rem;color:var(--text-muted);margin-top:0.4rem">
            <i class="fas fa-calendar" style="color:var(--primary-light)"></i> ${a.availability?.join(', ') || 'Flexible'}
          </p>
          <button class="bookAppointment btn-sm" data-id="${a.id}" style="margin-top:0.75rem">
            <i class="fas fa-calendar-plus"></i> Book Appointment
          </button>
        </div>
      </div>
    `).join('');
  }

  function attachAdvocateBooking(advocates) {
    document.querySelectorAll('.bookAppointment').forEach(btn => {
      btn.addEventListener('click', async () => {
        const date = prompt('Enter appointment date (YYYY-MM-DD):');
        const time = prompt('Enter time (HH:MM):');
        if (date && time) {
          await apiCall('appointments', 'POST', {
            id: `a${Date.now()}`,
            clientId: currentUser.id,
            advocateId: btn.dataset.id,
            time: `${date} ${time}`,
            status: 'pending',
            createdAt: new Date().toISOString()
          });
          showNotification('Appointment requested!');
        }
      });
    });
  }

  async function renderClientChat(container) {
    const cases = await apiCall('cases') || [];
    const myCases = cases.filter(c => c.clientId === currentUser.id && c.advocateId);
    const users = await apiCall('users') || [];
    const advocates = myCases.map(c => users.find(u => u.id === c.advocateId)).filter(Boolean);

    container.innerHTML = `
      <div class="page-header"><h1>Messages</h1></div>
      <div class="card">
        <select id="chatPartner" style="margin-bottom:1rem">
          <option value="">Select an advocate to chat...</option>
          ${advocates.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}
        </select>
        <div id="chatMessages" class="chat-box">
          <div class="empty-state" style="padding:1.5rem">
            <i class="fas fa-comments"></i><p>Select a conversation</p>
          </div>
        </div>
        <div class="flex-between" style="gap:0.5rem">
          <input type="text" id="messageInput" placeholder="Type your message..." style="flex:1;margin-bottom:0">
          <button id="sendMessage"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    `;

    let partner = null;
    document.getElementById('chatPartner').addEventListener('change', async (e) => {
      partner = e.target.value;
      if (partner) await loadMessages(partner, 'Advocate');
    });

    document.getElementById('sendMessage').addEventListener('click', async () => {
      if (!partner) return;
      const text = document.getElementById('messageInput').value.trim();
      if (!text) return;
      await apiCall('messages', 'POST', { id: `m${Date.now()}`, senderId: currentUser.id, receiverId: partner, text, timestamp: new Date().toISOString(), read: false });
      document.getElementById('messageInput').value = '';
      await loadMessages(partner, 'Advocate');
    });
  }

  async function loadMessages(partnerId, partnerLabel) {
    const messages = await apiCall('messages') || [];
    const chat = messages.filter(m =>
      (m.senderId === currentUser.id && m.receiverId === partnerId) ||
      (m.senderId === partnerId && m.receiverId === currentUser.id)
    );
    const chatDiv = document.getElementById('chatMessages');
    chatDiv.innerHTML = chat.length ? chat.map(m => {
      const isMe = m.senderId === currentUser.id;
      return `
        <div class="msg-row ${isMe ? 'msg-you' : ''}">
          <div class="msg-name">${isMe ? 'You' : partnerLabel}</div>
          <div class="msg-bubble ${isMe ? 'msg-bubble-you' : 'msg-bubble-other'}">${m.text}</div>
        </div>
      `;
    }).join('') : `<div class="empty-state" style="padding:1.5rem"><i class="fas fa-comment-slash"></i><p>No messages yet</p></div>`;
    chatDiv.scrollTop = chatDiv.scrollHeight;
  }

  function renderUserProfile(container) {
    container.innerHTML = `
      <div class="page-header"><h1>My Profile</h1></div>
      <div class="card">
        <div class="profile-header">
          <div class="profile-avatar"><i class="fas fa-user"></i></div>
          <div>
            <div class="profile-name">${currentUser.name}</div>
            <div class="profile-role">${currentUser.role === 'client' ? 'Client' : 'Advocate'}</div>
          </div>
        </div>
        <div class="profile-row"><i class="fas fa-envelope"></i><strong>Email</strong>${currentUser.email}</div>
        <div class="profile-row"><i class="fas fa-phone"></i><strong>Phone</strong>${currentUser.phone || 'Not provided'}</div>
        <div class="profile-row"><i class="fas fa-map-marker-alt"></i><strong>Location</strong>${currentUser.location || 'Not provided'}</div>
        <div class="profile-row"><i class="fas fa-id-badge"></i><strong>Role</strong>${currentUser.role === 'client' ? 'Client' : 'Advocate'}</div>
        ${currentUser.role === 'advocate' ? `
          <div class="profile-row"><i class="fas fa-gavel"></i><strong>Specialization</strong>${currentUser.category}</div>
          <div class="profile-row"><i class="fas fa-rupee-sign"></i><strong>Consultation Fee</strong>₹${currentUser.fee}</div>
          <div class="profile-row"><i class="fas fa-star"></i><strong>Rating</strong>${currentUser.rating || 0} / 5</div>
        ` : ''}
        <div class="profile-row"><i class="fas fa-calendar-alt"></i><strong>Member Since</strong>${new Date(currentUser.createdAt || Date.now()).toLocaleDateString()}</div>
      </div>
    `;
  }

  /* ===== ADVOCATE SECTIONS ===== */
  async function renderAdvocateDashboard(container) {
    const cases = await apiCall('cases') || [];
    const assigned = cases.filter(c => c.advocateId === currentUser.id);
    const pending = cases.filter(c => c.status === 'pending');

    container.innerHTML = `
      <div class="page-header">
        <h1>Advocate Dashboard</h1>
        <p>Managing ${assigned.length} cases</p>
      </div>
      <div class="grid-3" style="margin-bottom:1.25rem">
        <div class="stat-card">
          <div class="stat-icon">📋</div>
          <div class="stat-num">${assigned.length}</div>
          <div class="stat-label">My Cases</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⏳</div>
          <div class="stat-num">${assigned.filter(c => c.status === 'active').length}</div>
          <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-num">${assigned.filter(c => c.status === 'closed').length}</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>
      <div class="card">
        <h2>Cases by Category</h2>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1rem">${pending.length} pending cases available to accept</p>
        <canvas id="casesChart" height="130"></canvas>
      </div>
    `;

    setTimeout(() => {
      const ctx = document.getElementById('casesChart')?.getContext('2d');
      if (ctx) {
        const categories = ['Property Law', 'Criminal Law', 'Family Law', 'General Law'];
        const counts = categories.map(cat => cases.filter(c => c.category === cat).length);
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: categories,
            datasets: [{ label: 'Cases', data: counts, backgroundColor: '#1e3a8a', borderRadius: 6 }]
          },
          options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, grid: { color: '#f0f4fb' } }, x: { grid: { display: false } } }
          }
        });
      }
    }, 100);
  }

  async function renderAllCases(container) {
    const cases = await apiCall('cases') || [];
    const open = cases.filter(c => c.status !== 'closed');
    const users = await apiCall('users') || [];

    container.innerHTML = `
      <div class="page-header">
        <h1>Browse Cases</h1>
        <p>${open.length} open cases available</p>
      </div>
      <div class="card">
        ${open.length ? open.map(c => {
          const client = users.find(u => u.id === c.clientId);
          const adv = users.find(u => u.id === c.advocateId);
          const priClass = c.priority === 'High' ? 'badge-high' : 'badge-medium';
          return `
            <div class="case-item">
              <div class="flex-between">
                <h3>${c.title}</h3>
                <span class="badge ${priClass}">${c.priority || 'Medium'}</span>
              </div>
              <div class="case-meta"><i class="fas fa-user"></i> ${client?.name || 'Unknown'}</div>
              <div class="case-meta"><i class="fas fa-tag"></i> ${c.category}</div>
              <div class="case-meta"><i class="fas fa-align-left"></i> ${c.description?.substring(0, 100)}...</div>
              <div style="margin-top:0.75rem">
                ${c.advocateId === null
                  ? `<button class="acceptCase btn-success btn-sm" data-id="${c.id}"><i class="fas fa-check-circle"></i> Accept Case</button>`
                  : `<button disabled style="background:#9ca3af;cursor:not-allowed;border-radius:50px;padding:7px 14px;font-size:0.82rem;color:#fff;border:none">Assigned to ${adv?.name || 'Advocate'}</button>`
                }
              </div>
            </div>
          `;
        }).join('') : `<div class="empty-state"><i class="fas fa-check-circle"></i><p>No open cases at this time.</p></div>`}
      </div>
    `;

    document.querySelectorAll('.acceptCase').forEach(btn => {
      btn.addEventListener('click', async () => {
        const caseId = btn.dataset.id;
        const caseData = cases.find(c => c.id === caseId);
        caseData.advocateId = currentUser.id;
        caseData.status = 'active';
        caseData.timeline.push(`Accepted: ${new Date().toLocaleDateString()}`);
        await apiCall(`cases/${caseId}`, 'PUT', caseData);
        showNotification('Case accepted!');
        renderMain();
      });
    });
  }

  async function renderAssignedCases(container) {
    const cases = await apiCall('cases') || [];
    const assigned = cases.filter(c => c.advocateId === currentUser.id);
    const users = await apiCall('users') || [];

    container.innerHTML = `
      <div class="page-header">
        <h1>My Assigned Cases</h1>
        <p>${assigned.length} case${assigned.length !== 1 ? 's' : ''}</p>
      </div>
      <div class="card">
        ${assigned.length ? assigned.map(c => {
          const client = users.find(u => u.id === c.clientId);
          return `
            <div class="case-item">
              <div class="flex-between">
                <h3>${c.title}</h3>
                <span class="badge ${c.status === 'closed' ? 'badge-closed' : 'badge-active'}">${c.status}</span>
              </div>
              <div class="case-meta"><i class="fas fa-user"></i> ${client?.name || 'Unknown'}</div>
              <div class="case-meta"><i class="fas fa-tag"></i> ${c.category}</div>
              <div class="case-meta"><i class="fas fa-history"></i> ${c.timeline?.join(' → ')}</div>
              ${c.status !== 'closed' ? `<button class="closeCase btn-sm" style="margin-top:0.6rem;background:var(--success)" data-id="${c.id}"><i class="fas fa-check"></i> Mark Closed</button>` : ''}
            </div>
          `;
        }).join('') : `<div class="empty-state"><i class="fas fa-briefcase"></i><p>No cases assigned yet.</p></div>`}
      </div>
    `;

    document.querySelectorAll('.closeCase').forEach(btn => {
      btn.addEventListener('click', async () => {
        const caseId = btn.dataset.id;
        const caseData = assigned.find(c => c.id === caseId);
        caseData.status = 'closed';
        caseData.timeline.push(`Resolved: ${new Date().toLocaleDateString()}`);
        await apiCall(`cases/${caseId}`, 'PUT', caseData);
        showNotification('Case closed!');
        renderMain();
      });
    });
  }

  async function renderAppointments(container) {
    const appointments = await apiCall('appointments') || [];
    const mine = appointments.filter(a => a.advocateId === currentUser.id);
    const users = await apiCall('users') || [];

    container.innerHTML = `
      <div class="page-header">
        <h1>Appointments</h1>
        <p>${mine.length} scheduled</p>
      </div>
      <div class="card">
        ${mine.length ? mine.map(a => {
          const client = users.find(u => u.id === a.clientId);
          const isPending = a.status === 'pending';
          return `
            <div class="appt-card">
              <div class="appt-icon"><i class="fas fa-calendar-alt"></i></div>
              <div class="appt-info">
                <h4>${client?.name || 'Client'}</h4>
                <p><i class="fas fa-clock" style="margin-right:4px"></i> ${a.time}</p>
                <p><span class="badge ${isPending ? 'badge-pending' : 'badge-closed'}" style="margin-top:4px">${a.status}</span></p>
              </div>
              ${isPending ? `<button class="confirmAppt btn-sm btn-success" data-id="${a.id}"><i class="fas fa-check"></i> Confirm</button>` : ''}
            </div>
          `;
        }).join('') : `<div class="empty-state"><i class="fas fa-calendar"></i><p>No appointments scheduled.</p></div>`}
      </div>
    `;

    document.querySelectorAll('.confirmAppt').forEach(btn => {
      btn.addEventListener('click', async () => {
        const app = mine.find(a => a.id === btn.dataset.id);
        app.status = 'confirmed';
        await apiCall(`appointments/${app.id}`, 'PUT', app);
        showNotification('Appointment confirmed!');
        renderMain();
      });
    });
  }

  async function renderAdvocateChat(container) {
    const cases = await apiCall('cases') || [];
    const myCases = cases.filter(c => c.advocateId === currentUser.id);
    const users = await apiCall('users') || [];
    const clients = myCases.map(c => users.find(u => u.id === c.clientId)).filter(Boolean);

    container.innerHTML = `
      <div class="page-header"><h1>Client Messages</h1></div>
      <div class="card">
        <select id="clientSelect" style="margin-bottom:1rem">
          <option value="">Select a client...</option>
          ${clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
        </select>
        <div id="chatMessages" class="chat-box">
          <div class="empty-state" style="padding:1.5rem">
            <i class="fas fa-comments"></i><p>Select a client to view messages</p>
          </div>
        </div>
        <div class="flex-between" style="gap:0.5rem">
          <input type="text" id="messageInput" placeholder="Type your message..." style="flex:1;margin-bottom:0">
          <button id="sendMessage"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    `;

    let currentClient = null;
    document.getElementById('clientSelect').addEventListener('change', async (e) => {
      currentClient = e.target.value;
      if (currentClient) await loadMessages(currentClient, 'Client');
    });

    document.getElementById('sendMessage').addEventListener('click', async () => {
      if (!currentClient) return;
      const text = document.getElementById('messageInput').value.trim();
      if (!text) return;
      await apiCall('messages', 'POST', { id: `m${Date.now()}`, senderId: currentUser.id, receiverId: currentClient, text, timestamp: new Date().toISOString(), read: false });
      document.getElementById('messageInput').value = '';
      await loadMessages(currentClient, 'Client');
    });
  }

  async function renderAdvocateTools(container) {
    container.innerHTML = `
      <div class="page-header">
        <h1>Professional Tools</h1>
        <p>Manage your practice efficiently</p>
      </div>

      <div class="tool-card">
        <h3><i class="fas fa-brain"></i> AI Case Summary</h3>
        <button id="generateSummary"><i class="fas fa-magic"></i> Generate Summary</button>
        <div id="summaryResult" style="margin-top:1rem"></div>
      </div>

      <div class="card">
        <h2>Update Consultation Fee</h2>
        <label>New Fee (₹)</label>
        <input type="number" id="newFee" placeholder="Current: ₹${currentUser.fee}">
        <button id="updateFee"><i class="fas fa-rupee-sign"></i> Update Fee</button>
      </div>

      <div class="card">
        <h2>Update Availability</h2>
        <label>Available Days (comma-separated)</label>
        <input type="text" id="availability" value="${currentUser.availability?.join(', ') || ''}" placeholder="e.g. Monday, Wednesday, Friday">
        <button id="updateAvailability"><i class="fas fa-calendar-check"></i> Update</button>
      </div>
    `;

    document.getElementById('generateSummary').addEventListener('click', async () => {
      const cases = await apiCall('cases') || [];
      const myCases = cases.filter(c => c.advocateId === currentUser.id);
      document.getElementById('summaryResult').innerHTML = `
        <div class="case-item">
          <p><strong>Total Cases:</strong> ${myCases.length}</p>
          <p><strong>Active:</strong> ${myCases.filter(c => c.status === 'active').length}</p>
          <p><strong>Closed:</strong> ${myCases.filter(c => c.status === 'closed').length}</p>
          <p style="margin-top:0.5rem;color:var(--text-muted);font-size:0.85rem">
            <i class="fas fa-lightbulb" style="color:var(--warning)"></i>
            AI Suggestion: Prioritize active cases with oldest submission dates first.
          </p>
        </div>
      `;
    });

    document.getElementById('updateFee').addEventListener('click', async () => {
      const fee = parseInt(document.getElementById('newFee').value);
      if (fee) {
        currentUser.fee = fee;
        await apiCall(`users/${currentUser.id}`, 'PUT', currentUser);
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        showNotification('Fee updated!');
      }
    });

    document.getElementById('updateAvailability').addEventListener('click', async () => {
      const availability = document.getElementById('availability').value.split(',').map(s => s.trim()).filter(Boolean);
      currentUser.availability = availability;
      await apiCall(`users/${currentUser.id}`, 'PUT', currentUser);
      localStorage.setItem('currentUser', JSON.stringify(currentUser));
      showNotification('Availability updated!');
    });
  }

  /* ===== LOGOUT ===== */
  document.getElementById('logoutBtn').addEventListener('click', () => {
    currentUser = null;
    localStorage.removeItem('currentUser');
    currentSection = 'dashboard';
    renderAuth();
  });

  /* ===== INIT ===== */
  const savedUser = localStorage.getItem('currentUser');
  if (savedUser) {
    currentUser = JSON.parse(savedUser);
    renderApp();
  } else {
    renderAuth();
  }
</script>
</body>
</html>
